name: Daily DS Digest

on:
  schedule:
    # UTC 22:30 = KST 07:30
    - cron: '30 22 * * *'
  workflow_dispatch:  # Actions 탭에서 수동 실행 가능

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # 3.14 금지: protobuf C ext, supabase pyiceberg 빌드 실패
          cache: 'pip'

      - name: Install dependencies
        # 실패 케이스 A: supabase>=2.19.0 → pyiceberg 포함 → MSVC 없어 빌드 실패
        #   대응: requirements.txt에 supabase>=2.9.0,<2.19.0 고정
        # 실패 케이스 B: google-generativeai SDK → protobuf C ext 충돌
        #   대응: SDK 미사용, httpx로 REST API 직접 호출
        run: pip install -r requirements.txt

      - name: Run daily digest
        # 실패 케이스 C: YouTube transcript API가 GitHub Actions IP 차단
        #   대응: YOUTUBE_COOKIES secret에 쿠키 파일(Netscape 형식)을 base64 인코딩해서 저장
        #   쿠키 추출 방법: 브라우저에서 youtube.com 로그인 후
        #     "Get cookies.txt LOCALLY" 확장 프로그램으로 내보내기 →
        #     base64 인코딩: python -c "import base64,sys; print(base64.b64encode(open('cookies.txt','rb').read()).decode())"
        #     → 출력값을 GitHub Secrets > YOUTUBE_COOKIES 에 저장
        #   쿠키 미설정 시: 익명 요청으로 fallback (로컬은 보통 통과, Actions는 차단될 수 있음)
        # 실패 케이스 D: 환경변수 누락 → pydantic ValidationError
        #   대응: 아래 env 목록과 GitHub Secrets 등록 목록을 일치시킬 것
        env:
          # AI (Groq가 설정된 경우 Gemini 대신 사용)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'qwen/qwen3-32b' }}
          # Database
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Email
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # App
          BASE_URL: ${{ secrets.BASE_URL }}
          DELIVERY_CHANNELS: ${{ secrets.DELIVERY_CHANNELS }}
          # YouTube 쿠키 (GitHub Actions IP 차단 우회 — 선택사항)
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          # Content Sources
          YOUTUBE_CHANNELS: ${{ secrets.YOUTUBE_CHANNELS }}
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
          ARXIV_CATEGORIES: ${{ secrets.ARXIV_CATEGORIES || 'cs.LG,stat.ML' }}
          HACKERNEWS_KEYWORDS: ${{ secrets.HACKERNEWS_KEYWORDS || 'machine learning,MLOps,data science,LLM' }}
          HACKERNEWS_MIN_SCORE: ${{ secrets.HACKERNEWS_MIN_SCORE || '50' }}
          # Settings
          MAX_ITEMS_PER_DIGEST: ${{ secrets.MAX_ITEMS_PER_DIGEST }}
          RELEVANCE_THRESHOLD: ${{ secrets.RELEVANCE_THRESHOLD }}
          YT_FETCH_PER_CHANNEL: ${{ secrets.YT_FETCH_PER_CHANNEL }}
          YT_NEW_PER_CHANNEL: ${{ secrets.YT_NEW_PER_CHANNEL }}
          DRY_RUN: "false"
        run: python -m app.jobs.daily_digest
